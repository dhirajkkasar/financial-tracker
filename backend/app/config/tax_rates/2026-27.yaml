# FY 2026-27 capital gains tax rules
# Only assets with capital gains: STOCK_IN, STOCK_US, GOLD, REAL_ESTATE, MF
# FD/RD (interest income), PPF/EPF/NPS/SGB (exempt/special) are not here.
#
# stcg_rate_pct / ltcg_rate_pct: null = slab rate
# overrides: ordered list — all matching overrides merge top-to-bottom

STOCK_IN:
  stcg_rate_pct: 20.0
  ltcg_rate_pct: 12.5
  stcg_days: 365
  ltcg_exemption_inr: 125000
  ltcg_exempt_eligible: true

STOCK_US:
  stcg_rate_pct: null
  ltcg_rate_pct: 12.5
  stcg_days: 730

GOLD:
  stcg_rate_pct: null
  ltcg_rate_pct: 12.5
  stcg_days: 1095

REAL_ESTATE:
  stcg_rate_pct: null
  ltcg_rate_pct: 12.5
  stcg_days: 730

MF:
  stcg_rate_pct: 20.0
  ltcg_rate_pct: 12.5
  stcg_days: 365
  ltcg_exemption_inr: 125000
  ltcg_exempt_eligible: true

  DEBT:
    stcg_rate_pct: null
    ltcg_rate_pct: 12.5
    stcg_days: 730
    ltcg_exemption_inr: 0
    ltcg_exempt_eligible: false
    overrides:
      - match:
          bought_on_or_after: "2023-04-01"
        ltcg_rate_pct: null

  EQUITY:
    overrides:
      - match:
          isins: ["INF209KB1YA0"]
        stcg_days: 730
        stcg_rate_pct: null
        ltcg_exemption_inr: 0
        ltcg_exempt_eligible: false
      - match:
          isins: ["INF209KB1YA0"]
          bought_on_or_after: "2023-04-01"
        ltcg_rate_pct: null
